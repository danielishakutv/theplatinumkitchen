# Production stack for Platinum Kitchen.
# Deploy on the VPS in two steps so the old container keeps serving while the
# (slow) image build runs — then the swap is just a few seconds:
#   git pull
#   docker compose -f docker-compose.prod.yml --env-file .env.production build
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --wait
#
# The host's Apache reverse-proxies theplatinumkitchen.com to 127.0.0.1:3003.
# Nothing in this file binds to public ports.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: platinum-kitchen-app:latest
    container_name: platinum-kitchen-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Platinum Kitchen}
      # Resend (optional in dev, required in prod for outgoing email)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Platinum Kitchen <noreply@theplatinumkitchen.com>}
      # Cloudinary (optional — without it, admins paste image URLs by hand)
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
    ports:
      # Bound to localhost only — the host's web server (Apache here) is the
      # public entry point and reverse-proxies to this port. The container
      # itself always listens on 3000 internally; the left number is the host
      # port and is what you change per-instance when running multiple apps.
      - "127.0.0.1:3003:3000"
    healthcheck:
      # Hits the no-DB /api/health route. `up -d --wait` blocks on this, so a
      # deploy only "finishes" once the new container is actually serving —
      # and a wedged container is detectable instead of silently 500ing.
      test:
        - CMD-SHELL
        - node -e "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - pk-net

  db:
    image: postgres:16-alpine
    container_name: platinum-kitchen-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pk-pgdata-prod:/var/lib/postgresql/data
    ports:
      # Exposed on localhost so you can run `pnpm db:push` / `db:migrate` from
      # the VPS host shell. Remove this line once you no longer need host-side
      # migrations (or keep it for backups via pg_dump from the host).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pk-net

networks:
  pk-net:
    driver: bridge

volumes:
  pk-pgdata-prod:
    name: pk-pgdata-prod
